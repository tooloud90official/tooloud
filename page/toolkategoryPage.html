<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>툴 카데고리 페이지</title>
  <style>
    :root{
      --bg: #f3f3f3;
      --folder: rgba(255,255,255,.75);
      --stroke: rgba(0,0,0,.08);
      --shadow: 0 20px 60px rgba(0,0,0,.18);
      --radius: 22px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(1200px 600px at 20% 10%, #ffffff, var(--bg));
      font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      color:#111;
    }

    /* ===== Layout ===== */
    .dock{
      display:flex;
      gap: 22px;
      align-items:flex-start;
      padding: 30px 18px;
    }

    /* ✅ 폴더 + 패널 hover 유지용 */
    .folder-wrap{
      position: relative;
    }

    /* ===== Folder (collapsed) ===== */
    .folder{
      width: 132px;
      height: 132px;
      border-radius: var(--radius);
      background: var(--folder);
      border: 1px solid var(--stroke);
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      padding: 14px;
      cursor: default;
      position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      transition: transform .18s ease;
    }
    .folder-wrap:hover .folder{ transform: scale(1.02); }

    .mini-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      height: 100%;
      align-content: start;
      justify-items: center;
      padding-top: 6px;
    }
    .mini-icon{
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 6px 12px rgba(0,0,0,.08);
    }

    .folder-label{
      position:absolute;
      left:0;
      right:0;
      bottom:-34px;
      text-align:center;
      font-size:14px;
      opacity:.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 6px;
    }

    .overlay{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.35);
        opacity: 0;
        pointer-events: none; /* ✅ 항상 none */
        transition: opacity .18s ease;
        z-index: 10;
      }
      .overlay.open{
        opacity: 1;
        pointer-events: none; /* ✅ open이어도 none 유지 */
      }
      

    /* 패널: 화면 중앙 fixed */
    .panel{
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateY(10px) scale(.94);
      width: min(560px, 92vw);
      height: min(440px, 78vh);
      border-radius: 28px;
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
      padding: 18px;
      z-index: 20;
      pointer-events: none;
    }
    .panel.open{
      transform: translate(-50%, -50%) translateY(0) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .panel-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      padding: 6px 6px 14px 6px;
    }
    .panel-title{
      font-size:16px;
      font-weight: 650;
      letter-spacing: .2px;
    }
    .hint{
      font-size: 12px;
      opacity: .6;
      margin-top: 4px;
    }

    /* 앱 그리드: 개수 늘어나도 보기 좋게 */
    .apps{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      padding: 8px 6px 6px 6px;
    }
    @media (max-width: 520px){
      .apps{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .app{
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.75);
      padding: 14px 12px;
      cursor: pointer;
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .app:hover{
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0,0,0,.12);
    }
    .app:active{ transform: translateY(0) scale(.99); }

    .app-icon{
      width: 64px;
      height: 64px;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
    }
    .app-name{ font-size: 14px; opacity: .95; }
    .app-desc{
      font-size: 12px;
      opacity: .65;
      text-align:center;
      line-height: 1.35;
    }

    @media (prefers-reduced-motion: reduce){
      .overlay, .panel, .folder { transition: none; }
    }
  </style>
</head>

<body>
 <h2> 카테고리 페이지 </h2>
  <div class="dock" id="dock"></div>

  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <!-- 패널(공용 하나만) -->
  <div class="panel" id="panel" role="dialog" aria-modal="false" aria-label="Folder Panel">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panelTitle">Folder</div>
        <div class="hint">마우스를 밖으로 빼면 닫혀요</div>
      </div>
    </div>
    <div class="apps" id="panelApps"></div>
  </div>

  <script>
    // ✅ 폴더 3개 데이터: 각각 앱 3/4/5개
    const folders = [
      {
        title: "이미지 생성",
        apps: [
          { name: "App A", desc: "sample", grad: "linear-gradient(135deg,#ff6b6b,#ffd93d)" },
          { name: "App B", desc: "sample",   grad: "linear-gradient(135deg,#5f6cff,#7df9ff)" },
          { name: "App C", desc: "sample",     grad: "linear-gradient(135deg,#7c3aed,#f472b6)" },
        ],
      },
      {
        title: "영상 생성",
        apps: [
          { name: "App D", desc: "sample",       grad: "linear-gradient(135deg,#34d399,#a7f3d0)" },
          { name: "App E", desc: "sample",      grad: "linear-gradient(135deg,#fb7185,#fecdd3)" },
          { name: "App F", desc: "sample",         grad: "linear-gradient(135deg,#f59e0b,#fde68a)" },
          { name: "App G", desc: "sample",           grad: "linear-gradient(135deg,#60a5fa,#bfdbfe)" },
        ],
      },
      {
        title: "오디오 생성",
        apps: [
          { name: "App H", desc: "sample",      grad: "linear-gradient(135deg,#a78bfa,#ddd6fe)" },
          { name: "App I", desc: "sample",         grad: "linear-gradient(135deg,#22c55e,#bbf7d0)" },
          { name: "App J", desc: "sample",  grad: "linear-gradient(135deg,#f97316,#fed7aa)" },
          { name: "App K", desc: "sample",grad: "linear-gradient(135deg,#06b6d4,#a5f3fc)" },
          { name: "App L", desc: "sample",           grad: "linear-gradient(135deg,#64748b,#cbd5e1)" },
        ],
      },
    ];

    const dock = document.getElementById('dock');
    const overlay = document.getElementById('overlay');
    const panel = document.getElementById('panel');
    const panelTitle = document.getElementById('panelTitle');
    const panelApps = document.getElementById('panelApps');

    let closeTimer = null;

    function openFolder(folder){
      clearTimeout(closeTimer);

      // 패널 내용 렌더
      panelTitle.textContent = folder.title;
      panelApps.innerHTML = folder.apps.map(app => `
        <button class="app" data-app="${app.name}">
          <div class="app-icon" style="background:${app.grad}"></div>
          <div class="app-name">${app.name}</div>
          <div class="app-desc">${app.desc}</div>
        </button>
      `).join("");

      // 열기
      overlay.classList.add('open');
      panel.classList.add('open');

      // 앱 클릭 동작
      panelApps.querySelectorAll('.app').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          alert(`${btn.dataset.app} 실행! (여기에 라우팅/링크 연결)`);
          // 예) location.href = "/somewhere";
        });
      });
    }

    function scheduleClose(){
      clearTimeout(closeTimer);
      closeTimer = setTimeout(() => {
        overlay.classList.remove('open');
        panel.classList.remove('open');
      }, 120);
    }

    // 폴더(접힌 상태) 렌더: mini-grid는 "최대 9칸" 중 앞부분만 보여주기
    function renderFolders(){
      dock.innerHTML = folders.map((f, idx) => {
        const minis = f.apps.slice(0, 9).map(a =>
          `<div class="mini-icon" style="background:${a.grad}"></div>`
        ).join("");

        return `
          <div class="folder-wrap" data-idx="${idx}">
            <div class="folder" aria-label="${f.title}">
              <div class="mini-grid" aria-hidden="true">${minis}</div>
              <div class="folder-label">${f.title}</div>
            </div>
          </div>
        `;
      }).join("");

      // hover 이벤트 바인딩
      document.querySelectorAll('.folder-wrap').forEach(wrap => {
        const idx = Number(wrap.dataset.idx);

        wrap.addEventListener('mouseenter', () => openFolder(folders[idx]));
        wrap.addEventListener('mouseleave', scheduleClose);
      });
    }

    // 패널/오버레이 쪽에서도 hover 유지되게: 들어오면 닫기 타이머 취소, 나가면 닫기
    panel.addEventListener('mouseenter', () => clearTimeout(closeTimer));
    panel.addEventListener('mouseleave', scheduleClose);

    renderFolders();

    function isInside(el, x, y){
        if (!el) return false;
        const r = el.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      }
      
      document.addEventListener('mousemove', (e) => {
        if (!panel.classList.contains('open')) return;
      
        const insidePanel = isInside(panel, e.clientX, e.clientY);
        const insideFolder = !!e.target.closest('.folder-wrap'); // 폴더 위에 있으면 true
      
        if (insidePanel || insideFolder) {
          clearTimeout(closeTimer);
        } else {
          scheduleClose(); // ✅ 패널도 폴더도 아니면 닫기 예약
        }
      });
      
  </script>
</body>
</html>
