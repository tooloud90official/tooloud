<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOOLOUD - AI 소음 속, 나만의 도구</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../_common/background.css">
  <link rel="stylesheet" href="../_common/top-banner/top-banner.css">
  <link rel="stylesheet" href="../_common/searchBar/searchBar.css">
  <link rel="stylesheet" href="../_common/icon/icon.css">
  <link rel="stylesheet" href="../_common/alert/alert.css">
  <link rel="stylesheet" href="main1.css">
  <link rel="stylesheet" href="../_common/bottom-banner/bottom-banner.css">

  <!-- PDF.js -->
  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs";
    window.pdfjsLib = pdfjsLib;
  </script>
</head>
<body>

  <div id="top-banner"></div>

  <main class="main-container">

    <!-- 히어로 섹션 -->
    <section class="hero-section">
      <h1 class="hero-title">AI 소음 속, 나만의 도구</h1>
      <div id="searchbar-container"></div>
    </section>

    <!-- 추천 AI 툴 -->
    <section class="recommend-section" id="recommendSection" style="display:none">
      <h2 class="section-title">나에게 꼭 맞는 AI 툴을 사용해보세요.</h2>
      <div class="recommend-grid" id="recommendGrid"></div>
    </section>

    <!-- 작업물 카드 -->
    <section class="work-card-section">
      <div class="category-tabs" id="categoryTabs">
        <button class="category-tab is-active" data-category="media">이미지·오디오·영상</button>
        <button class="category-tab" data-category="res">리서치</button>
        <button class="category-tab" data-category="doc">문서 생성·요약·편집</button>
        <button class="category-tab" data-category="dev">개발·코딩</button>
        <button class="category-tab" data-category="edu">학습·교육</button>
        <button class="category-tab" data-category="ast">챗봇·어시스턴트</button>
      </div>

      <div class="work-card">
        <div class="work-card__header">
          <span class="work-card__badge">
            <img src="/media/palette.png" alt="프로필" class="profile">
            <span id="workCardUserName">님의 작업물</span>
          </span>
        </div>
        <div class="work-card__body">
          <div class="work-card__image" id="workCardImage">
            <button class="work-card__more-btn" id="workCardMoreBtn" style="display:none">
              <span class="more-btn__dot"></span>
              <span class="more-btn__dot"></span>
              <span class="more-btn__dot"></span>
            </button>
            <img id="workCardImg" src="/media/work-sample.png" alt="작업물 이미지">
          </div>
          <div class="work-card__tool" id="workCardTool"></div>
        </div>
      </div>
    </section>

    <!-- 대표 AI 툴 -->
    <section class="tools-section-wrap">
      <h2 class="section-title">대표 AI 툴을 빠르게 탐색해보세요.</h2>
      <div class="tools-section" id="toolsSection"></div>
    </section>

  </main>

  <div id="bottom-banner"></div>
  <div id="alert-root"></div>

  <!-- JS -->
  <script type="module" src="../_common/top-banner/include.js"></script>
  <script src="../_common/searchBar/searchBar.js"></script>
  <script src="../_common/icon/icon.js"></script>
  <script type="module" src="../_common/alert/alert.js"></script>
  <script type="module" src="main1.js"></script>
  <script type="module" src="../_common/confirm/confirm.js"></script>
  <script src="../_common/confirm/include.js"></script>
  <script src="../_common/bottom-banner/include.js"></script>

</body>
</html>
