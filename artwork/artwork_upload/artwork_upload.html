<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>작업물 업로드</title>

  <link rel="stylesheet" href="/_common/button/button.css" />
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css" />
  <link rel="stylesheet" href="/artwork/artwork_upload/artwork_upload.css" />
</head>
<body>
  <div id="top-banner" class="detail_AI-banner-root"></div>

  <div class="upload-page">
    <section class="upload-hero">
      <!-- ✅ 툴 선택 카드(클릭하면 모달) -->
      <div class="artwork-post__tool" id="toolPicker" role="button" tabindex="0" aria-label="툴 선택">
        <div class="artwork-post__tool-ic" aria-hidden="true"></div>

        <!-- ✅ 처음엔 안내 텍스트(가운데/회색) -->
        <div class="artwork-post__tool-placeholder" id="toolPlaceholder">
          툴을 선택해주세요.
        </div>

        <!-- ✅ 선택 후에만 표시 -->
        <div class="artwork-post__tool-meta" id="toolMeta" hidden>
          <div class="artwork-post__tool-top">
            <span class="artwork-post__tool-name" id="toolName"></span>
            <span class="artwork-post__tool-stars" id="toolStars"></span>
          </div>
          <div class="artwork-post__tool-brand" id="toolBrand"></div>
        </div>
      </div>

      <!-- ✅ 파일 드래그&드롭 영역 유지 -->
      <div class="drop-zone">
        <p>첨부할 파일을 여기에 끌어다 놓거나, 버튼을 클릭하세요.</p>
        <p class="sub">지원 파일: mp4, mp3, jpg, png, pdf, txt</p>
        <div id="fileUploadMount"></div>
      </div>
    </section>

    <main class="card">
      <div class="profile-section">
        <div class="avatar-ring">
          <img class="avatar" src="/media/profil.png" alt="프로필" />
        </div>
        <div class="user-name">Soojin</div>
      </div>

      <div class="input-section">
        <label class="label" for="description">설명</label>
        <div class="input-box">
          <textarea id="description" placeholder="커뮤니티 가이드라인 위반 시 제재될 수 있습니다."></textarea>
        </div>
      </div>

      <div class="button-group">
        <div id="cancelBtnMount" class="btn-wrap"></div>
        <div id="submitBtnMount" class="btn-wrap"></div>
      </div>
    </main>
  </div>

  <!-- 공통 버튼 -->
  <script src="/_common/button/button.js"></script>
  <!-- 상단 배너 include -->
  <script src="/_common/top-banner/include.js"></script>
  <!-- 페이지 JS -->
  <script src="/artwork/artwork_upload/artwork_upload.js" defer></script>
</body>
</html>
