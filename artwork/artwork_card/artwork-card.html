<template id="artworkCardTpl">
  <article class="artwork-card">
    <!-- ✅ 이미지 영역 -->
    <div class="artwork-card__media">
      <img class="artwork-card__img" src="/media/work.png" alt="작업물 이미지" />

      <!-- ✅ 툴 배지 -->
      <div class="artwork-card__tool">
        <a class="artwork-card__tool-icLink" href="https://brandfetch.io/" target="_blank" rel="noopener">
          <img
            class="artwork-card__tool-ic"
            src="https://cdn.brandfetch.io/ideA07K8J2/w/400/h/400/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1766207012399"
            alt="툴 아이콘"
          />
        </a>

        <div class="artwork-card__tool-meta">
          <div class="artwork-card__tool-top">
            <span class="artwork-card__tool-name" data-tool-name>Adobe Firefly</span>
          </div>
          <span class="artwork-card__tool-stars" data-tool-stars aria-label="평점">★★★★☆</span>
          <div class="artwork-card__tool-brand" data-tool-brand>@Adobe</div>
        </div>
      </div>

      <!-- ✅ 좋아요/댓글 -->
      <div class="artwork-card__actions">
        <button class="artwork-card__action artwork-card__action--icon" type="button" aria-label="좋아요">
          <img class="artwork-card__action-img" src="/media/heart.png" alt="" />
          <span class="artwork-card__action-count">21</span>
        </button>

        <button class="artwork-card__action artwork-card__action--icon" type="button" aria-label="댓글">
          <img class="artwork-card__action-img" src="/media/comment.png" alt="" />
          <span class="artwork-card__action-count">5</span>
        </button>
      </div>
    </div>

    <!-- ✅ 흰 패널 -->
    <div class="artwork-card__panel">
      <div class="artwork-card__profile">
        <div class="artwork-card__avatar-ring">
          <img class="artwork-card__avatar" src="/media/profil.png" alt="프로필" />
        </div>
        <div class="artwork-card__user" data-art-user>user</div>
      </div>

      <div class="artwork-card__content">
        <div class="artwork-card__date" data-art-date>YYYY.MM.DD</div>
        <p class="artwork-card__text" data-art-text></p>
      </div>
    </div>
  </article>
</template>
