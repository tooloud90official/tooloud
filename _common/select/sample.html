<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Sample</title>
  <link rel="stylesheet" href="/_common/select/select.css" />
</head>
<body>
  <div id="selectMount"></div>

  <script type="module">
    import { loadNativeSelect } from "/_common/select/select.js";

    loadNativeSelect({
      target: "#selectMount",
      placeholder: "선택 해주세요",
      value: "option2",
      options: [
        { value: "option1", label: "옵션 1" },
        { value: "option2", label: "옵션 2" },
        { value: "option3", label: "옵션 3" }
      ],
      onChange(item) {
        console.log(item);
      }
    });
  </script>
</body>
</html>
