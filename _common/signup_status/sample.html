<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Status Test</title>

  <!-- ✅ 컴포넌트 CSS 직접 로드 -->
  <link rel="stylesheet" href="./signup_status.css">

  <style>
    /* 테스트 페이지 배경만 간단히 */
    body {
      background: #f5f6f8;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>

<body>

  <!-- ✅ 컴포넌트 삽입 위치 -->
  <div id="signup-status-container"></div>


  <!-- ✅ 컴포넌트 HTML 불러오기 -->
  <script>
    async function loadSignupStatus() {
      const target = document.getElementById("signup-status-container");

      try {
        const res = await fetch("./signup_status.html");
        const html = await res.text();
        target.innerHTML = html;
      } catch (e) {
        console.error("signup status 로드 실패:", e);
      }
    }

    document.addEventListener("DOMContentLoaded", loadSignupStatus);
  </script>


  <!-- ✅ 컴포넌트 JS (인터랙션) -->
  <script src="./signup_status.js"></script>

</body>
</html>
