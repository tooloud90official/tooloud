<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal AI</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/personal_AI/personal_AI.css" />
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css" />
  <link rel="stylesheet" href="/_common/icon/icon.css" />
  <link rel="stylesheet" href="/_common/bottom-banner/bottom-banner.css">
</head>
<body>
  <div id="top-banner" class="personal-ai-banner-root"></div>
  <div class="personal-ai-page">
    <main class="personal-ai-main">
      <section class="personal-ai-hero">
        <h1 class="personal-ai-hero__title">당신을 위한 AI 툴을 한 눈에</h1>
      </section>

      <!-- AI 추천 툴 -->
      <section class="tool-board-section" id="ai-recommend">
        <h2 class="tool-board-section__title">AI 추천 툴</h2>
        <div class="tool-board">
          <div class="tool-board__grid" id="recommendedTools"></div>
        </div>
      </section>

      <!-- 최근 사용한 툴 -->
      <section class="tool-board-section" id="recent-tools">
        <h2 class="tool-board-section__title">최근 사용한 툴</h2>
        <div class="tool-board">
          <div class="tool-board__grid" id="recentTools"></div>
        </div>
      </section>

      <!-- 관심 있는 툴 -->
      <section class="tool-board-section" id="interest-tools">
        <h2 class="tool-board-section__title">관심 있는 툴</h2>
        <div class="tool-board">
          <div class="tool-board__grid" id="favoriteTools"></div>
        </div>
      </section>
    </main>
  </div>
  <div id="bottom-banner"></div>

  <script src="/_common/icon/icon.js"></script>
  <script type="module" src="/_common/top-banner/include.js"></script>
  <script type="module" src="/personal_AI/personal_AI.js"></script>
  <script src="/_common/bottom-banner/include.js"></script>
</body>
</html>
