<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정</title>
  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css">
  <link rel="stylesheet" href="/_common/button/button.css">
  <link rel="stylesheet" href="/_common/select/select.css">
  <link rel="stylesheet" href="/login2/login2.css">
  <link rel="stylesheet" href="/reset/reset.css">
</head>

<body>

  <div id="top-banner"></div>

  <main class="reset-page">

    <h1 class="title">비밀번호를 재설정하세요.</h1>

    <!-- 이메일 입력 -->
    <div class="form-group">
      <label class="label">이메일 주소 입력</label>
      <div class="email-row">
        <input type="text" id="emailId" class="email-input" placeholder="이메일 입력창">
        <span class="at">@</span>
        <div id="emailDomain"></div>
      </div>

      <!-- 코드 전송 버튼 -->
      <div class="email-verify-row">
        <button type="button" class="btn-send-code" id="sendCodeBtn">코드 전송</button>
      </div>

      <!-- 코드 입력 영역 -->
      <div class="verify-code-wrap" id="verifyCodeWrap" style="display:none;">
        <div class="verify-input-row">
          <div class="verify-input-wrap">
            <input type="text" class="verify-input" id="verifyCodeInput"
                   placeholder="인증코드 8자리" maxlength="8" inputmode="numeric">
            <span class="verify-timer" id="verifyTimer"></span>
          </div>
          <button type="button" class="btn-verify" id="verifyBtn">확인</button>
        </div>
        <button type="button" class="btn-resend" id="resendBtn">인증코드 재전송</button>
      </div>

      <p class="field-msg" id="email-msg"></p>
    </div>

    <!-- 새 비밀번호 입력 (코드 인증 후 노출) -->
    <div id="newPwWrap" style="display:none;">
      <div class="form-group">
        <label class="label">새 비밀번호</label>
        <input type="password" id="newPassword" placeholder="새 비밀번호 입력">
        <p class="field-msg" id="pw-msg"></p>
      </div>
      <div class="form-group">
        <label class="label">새 비밀번호 확인</label>
        <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 재입력">
        <p class="field-msg" id="pw-confirm-msg"></p>
      </div>
      <div id="resetBtnContainer"></div>
    </div>

    <div class="back-link" id="goBack">← 이전으로 돌아가기</div>

  </main>

  <script type="module" src="/_common/top-banner/include.js"></script>
  <script src="/_common/button/button.js"></script>
  <script type="module" src="/reset/reset.js"></script>

</body>
</html>
